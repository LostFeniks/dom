  <title>Whack a Goblin - Игра с гномом</title>
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <h1>🐷 Whack a Goblin! 🔨</h1>
      <p class="instructions">Гном (goblin) появляется в случайной ячейке игрового поля 4x4 и каждую секунду перемещается в другую случайную ячейку, никогда не оставаясь на том же месте.</p>
    </div>
    <div class="game-board-wrapper"></div>
  </div>
